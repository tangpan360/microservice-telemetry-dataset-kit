apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        args:
        - --badger.ephemeral=false
        - --badger.span-store-ttl=720h
        - --badger.directory-key=/badger/keys
        - --badger.directory-value=/badger/values
        env:
        - name: SPAN_STORAGE_TYPE
          value: badger
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - name: query
          containerPort: 16686
        - name: otlp-grpc
          containerPort: 4317
        - name: admin
          containerPort: 14269
        volumeMounts:
        - name: badger
          mountPath: /badger
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 8Gi
      volumes:
      - name: badger
        persistentVolumeClaim:
          claimName: jaeger-badger-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: observability
spec:
  selector:
    app: jaeger
  ports:
  - name: http
    port: 16686
    targetPort: 16686
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: observability
spec:
  selector:
    app: jaeger
  ports:
  - name: grpc-otlp
    port: 4317
    targetPort: 4317
